services:
  db_dev:
    image: postgres:16-alpine
    container_name: pulso_db_dev
    environment:
      POSTGRES_USER: pulso
      POSTGRES_PASSWORD: pulso
      POSTGRES_DB: pulso_dev
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pulso -d pulso_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  db_test:
    image: postgres:16-alpine
    container_name: pulso_db_test
    environment:
      POSTGRES_USER: pulso
      POSTGRES_PASSWORD: pulso
      POSTGRES_DB: pulso_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pulso -d pulso_test']
      interval: 5s
      timeout: 5s
      retries: 5